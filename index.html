<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JoJo's Bizarre Adventure</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background: linear-gradient(45deg,#3a0ca3,#7209b7,#f72585);
background-size:300% 300%;
animation:bg 10s infinite alternate;
color:white;
}

@keyframes bg{
0%{background-position:left}
100%{background-position:right}
}

/* MENU */

nav{
display:flex;
justify-content:space-between;
align-items:center;
background:black;
padding:15px 30px;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ff00ff;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
text-decoration:none;
color:white;
font-weight:bold;
transition:.3s;
}

.menu a:hover{
color:#ffea00;
transform:scale(1.2);
}

/* HERO */

.hero{
height:80vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.hero h1{
font-size:50px;
text-shadow:0 0 20px #ff00ff;
}

.hero button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff0080;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.hero button:hover{
background:#ffea00;
color:black;
}

/* GALERIA */

.galeria{
padding:50px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:black;
border-radius:15px;
overflow:hidden;
transition:.4s;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 20px #fff;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
padding:10px;
}

/* STAND EFFECT */

#standEffect{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
font-size:80px;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
color:#ffea00;
text-shadow:0 0 30px #ff00ff;
transition:.5s;
}

/* FOOTER */

footer{
background:black;
padding:20px;
text-align:center;
margin-top:40px;
}

/* MOBILE */

@media(max-width:700px){

.hero h1{
font-size:32px;
}

.menu{
gap:10px;
font-size:14px;
}

}

</style>
</head>

<body>

<!-- MENU -->

<nav>
<div class="logo">JOJO</div>

<div class="menu">
<a href="#">Início</a>
<a href="#galeria">Personagens</a>
<a href="#">Stands</a>
</div>
</nav>

<!-- HERO -->

<section class="hero">

<h1>JoJo's Bizarre Adventure</h1>

<p>Escolha um personagem e libere seu Stand!</p>

<button onclick="stand()">ATIVAR STAND</button>

<br><br>

<button onclick="musica()">🎵 Música Tema</button>

</section>

<!-- GALERIA -->

<section class="galeria" id="galeria">

<h2>Personagens</h2>

<div class="grid">

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRTQvTL2UjHyvXHLM3yEjxPDY6UB3aLBMZZPukTyj6BBw&s=10">
<h3>Jotaro Kujo</h3>
</div>

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRwNdPWTEAxIudRE6K4aXVIlc3O8B_Ak7FQn5d4u5PY1YwZxKUpbqMGn-A&s=10">
<h3>Dio Brando</h3>
</div>

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRODnb3SxXlWF8sPoLqdSC8CHgG-bv8QErS8wFvy_R8hA&s=10">
<h3>Giorno Giovanna</h3>
</div>

<div class="card">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdjs0ziQheNAhfitjZYwgMwuLyCXQEHJJMeFVrJF18oA&s=10">
<h3>Josuke Higashikata</h3>
</div>

</div>

</section>

<div id="standEffect">ZA WARUDO</div>

<footer>
  Site criado por um desocupado 😉
</footer>


<!-- MUSICA -->

<audio id="musicaTema" loop>
<source src="https://www.myinstants.com/media/sounds/za-warudo.mp3">
</audio>

<script>

let tocando=false

function musica(){

let audio=document.getElementById("musicaTema")

if(!tocando){
audio.play()
tocando=true
}else{
audio.pause()
tocando=false
}

}

function stand(){

let efeito=document.getElementById("standEffect")

efeito.style.opacity="1"

setTimeout(()=>{
efeito.style.opacity="0"
},1500)

}

</script>

</body>
</html>
