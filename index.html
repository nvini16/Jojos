<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JoJo's Bizarre Adventure</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background: linear-gradient(45deg,#3a0ca3,#7209b7,#f72585);
background-size:300% 300%;
animation:bg 10s infinite alternate;
color:white;
overflow-x:hidden;
}

@keyframes bg{
0%{background-position:left}
100%{background-position:right}
}

/* NAV */

nav{
display:flex;
justify-content:space-between;
align-items:center;
background:black;
padding:15px 30px;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:24px;
color:#ff00ff;
font-weight:bold;
}

.menu{
display:flex;
gap:20px;
}

.menu a{
color:white;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

.menu a:hover{
color:#ffea00;
}

/* MENU MOBILE */

.hamburguer{
display:none;
font-size:28px;
cursor:pointer;
}

/* HERO */

.hero{
height:80vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:50px;
text-shadow:0 0 20px #ff00ff;
}

.hero button{
margin-top:20px;
padding:12px 25px;
border:none;
background:#ff0080;
color:white;
font-size:18px;
border-radius:10px;
cursor:pointer;
}

.hero button:hover{
background:#ffea00;
color:black;
}

/* GALERIA */

.galeria{
padding:50px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:black;
border-radius:15px;
overflow:hidden;
transition:.4s;
cursor:pointer;
}

.card:hover{
transform:scale(1.08);
box-shadow:0 0 20px #fff;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
padding:10px;
}

/* STAND */

#standEffect{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
font-size:80px;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
color:#ffea00;
text-shadow:0 0 40px #ff00ff;
transition:.5s;
}

/* PARTICULAS */

.particle{
position:fixed;
width:10px;
height:10px;
background:white;
border-radius:50%;
pointer-events:none;
animation:particle 1s linear;
}

@keyframes particle{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-200px);
opacity:0;
}
}

/* FOOTER */

footer{
background:black;
padding:20px;
text-align:center;
margin-top:40px;
}

/* MOBILE */

@media(max-width:700px){

.menu{
display:none;
flex-direction:column;
background:black;
position:absolute;
top:60px;
right:0;
width:200px;
padding:20px;
}

.menu.active{
display:flex;
}

.hamburguer{
display:block;
}

.hero h1{
font-size:32px;
}

}

</style>

</head>

<body>

<nav>

<div class="logo">JOJO</div>

<div class="hamburguer" onclick="menu()">☰</div>

<div class="menu" id="menu">
<a href="#">Início</a>
<a href="#galeria">Personagens</a>
<a href="#">Stands</a>
</div>

</nav>

<section class="hero">

<h1>JoJo's Bizarre Adventure</h1>

<p>Escolha um personagem e libere seu Stand!</p>

<button onclick="stand()">ATIVAR STAND</button>

<br><br>

<button onclick="musica()">🎵 Música Tema</button>

</section>

<section class="galeria" id="galeria">

<h2>Personagens</h2>

<div class="grid">

<div class="card" onclick="personagem('ORA ORA ORA')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRTQvTL2UjHyvXHLM3yEjxPDY6UB3aLBMZZPukTyj6BBw&s=10">
<h3>Jotaro Kujo</h3>
</div>

<div class="card" onclick="personagem('ZA WARUDO')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRwNdPWTEAxIudRE6K4aXVIlc3O8B_Ak7FQn5d4u5PY1YwZxKUpbqMGn-A&s=10">
<h3>Dio Brando</h3>
</div>

<div class="card" onclick="personagem('MUDA MUDA')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRbsReXi2wnbjbK0H8n4_mS9AHW6HJJC8xmS4A4yPmuAg&s=10">
<h3>Giorno Giovanna</h3>
</div>

<div class="card" onclick="personagem('DORA DORA')">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRdjs0ziQheNAhfitjZYwgMwuLyCXQEHJJMeFVrJF18oA&s=10">
<h3>Josuke Higashikata</h3>
</div>

</div>

</section>

<div id="standEffect"></div>

<footer>
Site criado por um desocupado 😉
</footer>

<!-- YOUTUBE PLAYER -->

<div style="display:none;">
<iframe
id="player"
width="0"
height="0"
src=""
frameborder="0"
allow="autoplay">
</iframe>
</div>

<script>

let tocando=false

function musica(){

let player=document.getElementById("player")

if(!tocando){

player.src="https://www.youtube.com/embed/wtrFQLivuCg?autoplay=1"
tocando=true

}else{

player.src=""
tocando=false

}

}

function stand(){

let efeito=document.getElementById("standEffect")

efeito.innerText="ZA WARUDO"

efeito.style.opacity="1"

particles()

setTimeout(()=>{
efeito.style.opacity="0"
},1500)

}

function personagem(texto){

let efeito=document.getElementById("standEffect")

efeito.innerText=texto

efeito.style.opacity="1"

particles()

setTimeout(()=>{
efeito.style.opacity="0"
},1500)

}

function particles(){

for(let i=0;i<30;i++){

let p=document.createElement("div")

p.className="particle"

p.style.left=Math.random()*100+"%"

p.style.top=Math.random()*100+"%"

document.body.appendChild(p)

setTimeout(()=>p.remove(),1000)

}

}

function menu(){

let m=document.getElementById("menu")

m.classList.toggle("active")

}

</script>

</body>
</html>
